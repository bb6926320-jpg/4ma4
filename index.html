<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4ma4 - الدردشة الجماعية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #d1d7db; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* شاشة تسجيل الدخول */
        #login-screen { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        #login-screen h2 { color: #075e54; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 20px; outline: none; text-align: center; }
        input:focus { border-color: #25d366; }
        .btn-login { width: 100%; padding: 12px; background-color: #25d366; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* شاشة الدردشة */
        #chat-screen { display: none; width: 420px; height: 90vh; max-height: 700px; background: #e5ddd5; border-radius: 10px; flex-direction: column; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .header { background: #075e54; color: white; padding: 15px; text-align: center; }
        .status { font-size: 12px; color: #b9f6ca; margin-top: 2px; }

        .messages-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 10px; font-size: 14px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        
        .user-name { font-size: 11px; font-weight: bold; display: block; margin-bottom: 4px; }
        
        .received { background: white; align-self: flex-start; border-top-right-radius: 0; }
        .received .user-name { color: #e91e63; }
        
        .sent { background: #dcf8c6; align-self: flex-end; border-top-left-radius: 0; }
        .sent .user-name { color: #075e54; }

        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; margin: 0; border-radius: 25px; padding: 12px; border: 1px solid #ddd; text-align: right; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; background-color: #075e54; color: white; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>واتساب 4ma4</h2>
        <input type="text" id="username" placeholder="اكتب اسمك المستعار هنا">
        <button class="btn-login" onclick="startChat()">دخول للمجموعة</button>
    </div>

    <div id="chat-screen">
        <div class="header">
            <strong>المجموعة العامة</strong>
            <div class="status">● متصل الآن</div>
        </div>

        <div class="messages-area" id="msg-box">
            <div style="text-align:center; font-size:11px; color:#777; margin:10px 0; background:#fff3cd; padding:5px; border-radius:5px;">
                مرحباً بك في نظام 4ma4 للدردشة
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-msg" placeholder="اكتب رسالة...">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // --- إعدادات Firebase الخاصة بمشروعك 4ma4 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDG38RBsPYbp468ryt9OmAEsviT_xCH8XM",
            authDomain: "ma4-4744f.firebaseapp.com",
            databaseURL: "https://ma4-4744f-default-rtdb.firebaseio.com", 
            projectId: "ma4-4744f",
            storageBucket: "ma4-4744f.firebasestorage.app",
            messagingSenderId: "104826236968",
            appId: "1:104826236968:web:bb194f4f9c53a7a1b4451d",
            measurementId: "G-7W0592TML0"
        };

        // بدء تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUser = "";

        function startChat() {
            const nameInput = document.getElementById('username');
            currentUser = nameInput.value.trim();
            
            if(currentUser) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                listenForMessages(); // البدء في استلام الرسائل من الجميع
            } else {
                alert("من فضلك اكتب اسمك أولاً");
            }
        }

        function sendMessage() {
            const msgInput = document.getElementById('user-msg');
            if(msgInput.value.trim() !== "") {
                // إرسال الرسالة إلى قاعدة بيانات Firebase لكي يراها الجميع
                database.ref("messages").push().set({
                    "sender": currentUser,
                    "text": msgInput.value,
                    "time": Date.now()
                });
                msgInput.value = "";
            }
        }

        // دالة استقبال الرسائل الحية
        function listenForMessages() {
            const msgBox = document.getElementById('msg-box');
            database.ref("messages").on("child_added", (snapshot) => {
                const data = snapshot.val();
                const isMe = data.sender === currentUser;
                const type = isMe ? "sent" : "received";
                const nameDisplay = isMe ? "أنت" : data.sender;

                const messageHtml = `
                    <div class="message ${type}">
                        <span class="user-name">${nameDisplay}</span>
                        ${data.text}
                    </div>
                `;
                msgBox.innerHTML += messageHtml;
                msgBox.scrollTop = msgBox.scrollHeight; // النزول لآخر رسالة تلقائياً
            });
        }

        // تفعيل زر Enter للإرسال
        document.getElementById('user-msg').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { sendMessage(); }
        });
    </script>
</body>
</html>
