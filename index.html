<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - نظام المجموعات</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #d1d7db; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* شاشة تسجيل الدخول */
        #login-screen { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        #login-screen h2 { color: #075e54; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        input:focus { border-color: #25d366; }
        button { width: 100%; padding: 12px; background-color: #25d366; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #128c7e; }

        /* شاشة الدردشة */
        #chat-screen { display: none; width: 400px; height: 600px; background: #e5ddd5; border-radius: 10px; flex-direction: column; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* رأس الدردشة (بدون زر خروج) */
        .header { background: #075e54; color: white; padding: 15px; text-align: center; }
        .status { font-size: 12px; color: #cfd8dc; margin-top: 2px; }

        /* منطقة الرسائل */
        .messages-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 14px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        
        .user-name { font-size: 11px; font-weight: bold; display: block; margin-bottom: 4px; }
        
        /* رسائل النظام أو الآخرين */
        .received { background: white; align-self: flex-start; border-top-right-radius: 0; }
        .received .user-name { color: #e91e63; } /* لون اسم "النظام" */
        
        /* رسائلك أنت */
        .sent { background: #dcf8c6; align-self: flex-end; border-top-left-radius: 0; }
        .sent .user-name { color: #075e54; }

        /* منطقة الكتابة */
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; margin: 0; border-radius: 20px; padding: 10px 15px; border: 1px solid #ddd; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background-color: #25d366; color: white; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>تسجيل الدخول</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة السر">
        <input type="text" id="username" placeholder="اسمك المستعار">
        <button onclick="startChat()">دخول للمجموعة</button>
    </div>

    <div id="chat-screen">
        <div class="header">
            <strong>المجموعة العامة</strong>
            <div class="status">● متصل الآن</div>
        </div>

        <div class="messages-area" id="msg-box">
            <div class="message received">
                <span class="user-name">النظام</span>
                أهلاً بك في المجموعة العامة!
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-msg" placeholder="اكتب رسالة...">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        function startChat() {
            const name = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            
            if(name && email) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                
                const msgBox = document.getElementById('msg-box');
                // رسالة دخول للنظام
                msgBox.innerHTML += `<div style="text-align:center; font-size:11px; color:#777; margin:5px 0;">دخل ${name} إلى المجموعة</div>`;
            } else {
                alert("يرجى إدخال البيانات");
            }
        }

        function sendMessage() {
            const msgInput = document.getElementById('user-msg');
            const name = document.getElementById('username').value;
            const msgBox = document.getElementById('msg-box');

            if(msgInput.value.trim() !== "") {
                const newMsg = `
                    <div class="message sent">
                        <span class="user-name">أنت</span>
                        ${msgInput.value}
                    </div>
                `;
                msgBox.innerHTML += newMsg;
                msgInput.value = "";
                msgBox.scrollTop = msgBox.scrollHeight;
            }
        }
        
        // إرسال الرسالة عند الضغط على Enter
        document.getElementById('user-msg').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
